<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microgravity Tinkerer - MVP Chunk 1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 16px;
            border-radius: 8px;
            max-width: 300px;
        }
        #ui h1 { margin: 0 0 8px 0; font-size: 18px; }
        #ui p { margin: 4px 0; font-size: 14px; opacity: 0.8; }
        #vrButton {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            font-size: 16px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
        }
        #vrButton:disabled { background: #444; cursor: not-allowed; }
        #comfort {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
        }
        #comfort button {
            display: block;
            margin: 8px 0;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
    <!-- Babylon.js + Havok Physics from CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="ui">
        <h1>Microgravity Tinkerer</h1>
        <p>Chunk 1: VR Entry + Grab Test</p>
        <p>Controllers: Trigger to grab</p>
        <p>Hand tracking: Pinch to grab</p>
    </div>
    <button id="vrButton" disabled>VR Not Available</button>
    <div id="comfort">
        <button id="snapTurn">Snap Turn: 30°</button>
        <button id="vignette">Vignette: OFF</button>
    </div>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true, {
            preserveDrawingBuffer: false,
            stencil: false,
            disableWebGL2Support: false // WebGL2 = better perf on Quest 2
        });

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.08, 1);

            // --- 1. CAMERA + XR SETUP ---
            const camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 1.6, 0), scene);
            camera.minZ = 0.1; // Quest displays need near clip < 0.1m to avoid clipping your hands

            // --- 2. LIGHTING: Quest-safe, no shadows for perf ---
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 1.2;
            light.diffuse = new BABYLON.Color3(0.8, 0.9, 1.0); // Cool space tint
            light.groundColor = new BABYLON.Color3(0.1, 0.1, 0.2);

            // --- 3. ENVIRONMENT: Low-poly skybox + workbench ---
            const skybox = BABYLON.MeshBuilder.CreateBox("skybox", { size: 100 }, scene);
            const skyboxMat = new BABYLON.StandardMaterial("skyboxMat", scene);
            skyboxMat.backFaceCulling = false;
            skyboxMat.disableLighting = true;
            skyboxMat.emissiveColor = new BABYLON.Color3(0.01, 0.01, 0.05);
            skybox.material = skyboxMat;
            skybox.infiniteDistance = true;

            // Workbench: 0.6m radius so everything is in arm's reach = no locomotion needed
            const bench = BABYLON.MeshBuilder.CreateCylinder("bench", {
                height: 0.05,
                diameter: 1.2,
                tessellation: 32
            }, scene);
            bench.position.y = 1.0;
            const benchMat = new BABYLON.StandardMaterial("benchMat", scene);
            benchMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.25);
            benchMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
            bench.material = benchMat;

            // --- 4. PHYSICS: Havok for zero-G grab ---
            const havokInstance = await HavokPhysics();
            const hk = new BABYLON.HavokPlugin(true, havokInstance);
            scene.enablePhysics(new BABYLON.Vector3(0, 0, 0), hk); // Zero-G!

            // Make bench static
            new BABYLON.PhysicsAggregate(bench, BABYLON.PhysicsShapeType.CYLINDER, { mass: 0 }, scene);

            // Test grabbable object: low-poly cube
            const part = BABYLON.MeshBuilder.CreateBox("grabPart", { size: 0.1 }, scene);
            part.position = new BABYLON.Vector3(0, 1.3, -0.3);
            const partMat = new BABYLON.StandardMaterial("partMat", scene);
            partMat.diffuseColor = new BABYLON.Color3(0.9, 0.3, 0.2);
            partMat.emissiveColor = new BABYLON.Color3(0.2, 0.05, 0.01);
            part.material = partMat;

            // Physics body for grabbing
            const partAggregate = new BABYLON.PhysicsAggregate(part, BABYLON.PhysicsShapeType.BOX, { mass: 1, restitution: 0.5 }, scene);

            // --- 5. WEBXR SETUP ---
            const xr = await scene.createDefaultXRExperienceAsync({
                floorMeshes: [bench],
                optionalFeatures: true,
                pointerSelectionOptions: {
                    enablePointerSelectionOnAllControllers: true
                }
            });

            // Enable hand tracking as fallback
            xr.baseExperience.featuresManager.enableFeature(BABYLON.WebXRFeatureName.HAND_TRACKING, "latest", {
                xrInput: xr.input
            });

            // --- 6. GRAB INTERACTION: Works for controllers + hands ---
            const sixDofDragBehavior = new BABYLON.SixDofDragBehavior();
            sixDofDragBehavior.dragDeltaRatio = 1; // 1:1 movement in VR
            sixDofDragBehavior.zDragFactor = 1;
            part.addBehavior(sixDofDragBehavior);

            // --- 7. COMFORT SETTINGS ---
            let snapTurnEnabled = true;
            const snapTurnButton = document.getElementById("snapTurn");
            snapTurnButton.onclick = () => {
                snapTurnEnabled =!snapTurnEnabled;
                snapTurnButton.textContent = `Snap Turn: ${snapTurnEnabled? '30°' : 'OFF'}`;
            };

            // Snap turn on thumbstick
            xr.input.onControllerAddedObservable.add((controller) => {
                controller.onMotionControllerInitObservable.add((motionController) => {
                    const thumbstick = motionController.getComponent("xr-standard-thumbstick");
                    if (thumbstick) {
                        thumbstick.onAxisValueChangedObservable.add(() => {
                            if (!snapTurnEnabled) return;
                            if (Math.abs(thumbstick.axes.x) > 0.7) {
                                const rotation = thumbstick.axes.x > 0? Math.PI / 6 : -Math.PI / 6; // 30 deg
                                xr.baseExperience.camera.rotation.y += rotation;
                                thumbstick.axes.x = 0; // Prevent repeat
                            }
                        });
                    }
                });
            });

            // Vignette for comfort
            let vignetteEnabled = false;
            const vignetteButton = document.getElementById("vignette");
            const vignettePostProcess = new BABYLON.ImageProcessingPostProcess("vignette", 1.0, camera);
            vignettePostProcess.vignetteEnabled = false;
            vignettePostProcess.vignetteWeight = 4.0;
            vignetteButton.onclick = () => {
                vignetteEnabled =!vignetteEnabled;
                vignettePostProcess.vignetteEnabled = vignetteEnabled;
                vignetteButton.textContent = `Vignette: ${vignetteEnabled? 'ON' : 'OFF'}`;
            };

            // --- 8. VR BUTTON ---
            const vrButton = document.getElementById("vrButton");
            xr.baseExperience.onStateChangedObservable.add((state) => {
                if (state === BABYLON.WebXRState.IN_XR) {
                    document.getElementById("ui").style.display = "none";
                    vrButton.style.display = "none";
                }
            });

            if (await xr.baseExperience.sessionManager.isSessionSupportedAsync("immersive-vr")) {
                vrButton.disabled = false;
                vrButton.textContent = "Enter VR";
                vrButton.onclick = () => xr.baseExperience.enterXRAsync("immersive-vr", "local-floor");
            } else {
                vrButton.textContent = "VR Not Supported";
            }

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
            window.addEventListener("resize", () => engine.resize());
        });
    </script>
</body>
</html>
